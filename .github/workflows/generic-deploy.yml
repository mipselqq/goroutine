name: Reusable Deploy

on:
  workflow_call:
    inputs:
      env_name:
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.env_name }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup SSH Key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keygen -y -f ~/.ssh/id_rsa > ~/.ssh/id_rsa.pub
          ssh-keyscan -H "${{ vars.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Cache Ansible
        id: cache-ansible
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.local
            ~/.ansible/collections
          key: ${{ runner.os }}-ansible-${{ hashFiles('infra/ansible/requirements.txt', 'infra/ansible/requirements.yml') }}

      - name: Install Ansible Core & Collections
        if: steps.cache-ansible.outputs.cache-hit != 'true'
        run: |
          pip install --user -r infra/ansible/requirements.txt
          ansible-galaxy collection install -r infra/ansible/requirements.yml

      - name: Create .env file from GitHub Vars/Secrets
        run: |
          cat <<'EOF' > .env.prod
          ENV=${{ vars.ENV }}
          LOG_LEVEL=${{ vars.LOG_LEVEL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXP=${{ vars.JWT_EXP }}
          HOST=${{ vars.HOST }}
          SWAGGER_HOST=${{ vars.SWAGGER_HOST }}
          PORT=${{ vars.PORT }}
          ADMIN_PORT=${{ vars.ADMIN_PORT }}
          ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}

          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          POSTGRES_PORT=${{ vars.POSTGRES_PORT }}
          POSTGRES_HOST=${{ vars.POSTGRES_HOST }}

          PROMETHEUS_USER=${{ vars.PROMETHEUS_USER }}
          PROMETHEUS_PASSWORD=${{ secrets.PROMETHEUS_PASSWORD }}
          PROMETHEUS_BCRYPT_HASH='${{ secrets.PROMETHEUS_BCRYPT_HASH }}'

          GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}

          REDIS_HOST=${{ vars.REDIS_HOST }}
          REDIS_PORT=${{ vars.REDIS_PORT }}
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}

          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_LINK_TOKEN_TTL=${{ vars.TELEGRAM_LINK_TOKEN_TTL }}
          EOF

      - name: Run Ansible Playbook
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          ansible-playbook -i "${{ vars.DEPLOY_HOST }}," \
            -u "root" \
            --private-key ~/.ssh/id_rsa \
            -e "deploy_username=${{ vars.DEPLOY_USERNAME }}" \
            infra/ansible/server-setup-ubuntu.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
          ANSIBLE_PIPELINING: True
          ANSIBLE_CALLBACKS_ENABLED: profile_tasks
