name: Deploy to VDS

on:
  push:
    branches: [main]
    paths: # Main is locked in GitHub settings, don't bother runner on some checks passed in pull_request
      - "Dockerfile"
      - "docker-compose*"
      - ".github/workflows/deploy.yml"
      - "infra/prometheus.template.yml"
      - "infra/**"
      - "internal/**"
      - "cmd/**"
  pull_request: # Run all checks despite changes so required checks are always satisfied
    # There's no need to make this more complicated since the checks are fast (for now) and parallel

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
  cancel-in-progress: false

jobs:
  build-scan-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: goroutine:temp
          cache-from: type=gha
          cache-to: type=gha,mode=max # Cache Docker layers in GitHub Actions cache

      - name: Cache Trivy DB
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/trivy-db
          key: trivy-db-${{ github.run_number }} # Save installation with always unique keys
          restore-keys: | # Restore previous installation
            trivy-db-

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: "goroutine:temp"
          format: "table"
          severity: "CRITICAL,HIGH"
          cache-dir: /tmp/trivy-db # Download only deltas

      - name: Tag and Push
        run: |
          docker tag goroutine:temp ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:latest

  deploy-staging:
    name: Deploy Staging
    needs: build-scan-push
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/generic-deploy.yml
    with:
      env_name: staging
    secrets: inherit

  deploy-prod:
    name: Deploy Production
    needs: build-scan-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/generic-deploy.yml
    with:
      env_name: production
    secrets: inherit

  ping-staging-health:
    name: Ping Staging Health
    needs: deploy-staging
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 1
    steps:
      - name: Ping /v1/health
        run: |
          curl \
            --fail \
            --show-error \
            --silent \
            --retry 5 \
            --retry-delay 5 \
            --retry-max-time 30 \
            --retry-all-errors \
            "http://${{ vars.DEPLOY_HOST }}/v1/health"

  k6-staging-race:
    name: K6 Race Checks on Staging
    needs: ping-staging-health
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1.2.1
      - name: Run k6 race scenarios against staging
        env:
          K6_ROOT: http://${{ vars.DEPLOY_HOST }}
        run: make test-k6-race

  ping-prod-health:
    name: Ping Production Health
    needs: deploy-prod
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 1
    steps:
      - name: Ping /v1/health
        run: |
          curl \
            --fail \
            --show-error \
            --silent \
            --retry 5 \
            --retry-delay 5 \
            --retry-max-time 30 \
            --retry-all-errors \
            "http://${{ vars.DEPLOY_HOST }}/v1/health"
