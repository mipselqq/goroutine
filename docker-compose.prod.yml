services:
  db:
    image: postgres:18-alpine
    container_name: goro-postgres-prod
    cpu_shares: 1024
    oom_score_adj: -800
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_HOST
      - POSTGRES_PORT
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_prod:/var/lib/postgresql

  redis:
    image: redis:8.6.3-alpine
    container_name: goro-redis-prod
    cpu_shares: 512
    oom_score_adj: -500
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data_prod:/data

  app:
    image: ghcr.io/mipselqq/goroutine:latest
    container_name: goro-goroutine-prod
    cpu_shares: 1024
    oom_score_adj: -900
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_HOST
      - POSTGRES_PORT

      - REDIS_HOST
      - REDIS_PORT
      - REDIS_PASSWORD

      - ENV
      - LOG_LEVEL
      - SWAGGER_HOST
      - HOST
      - PORT
      - ADMIN_PORT
      - JWT_SECRET
      - ALLOWED_ORIGINS
      - JWT_EXP
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "127.0.0.1:${PORT}:${PORT}"

  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: goro-prometheus-prod
    cpu_shares: 512
    oom_score_adj: 100
    restart: unless-stopped
    volumes:
      - ./infra/prometheus/prometheus.template.yml:/etc/prometheus/prometheus.template.yml:ro,Z
      - ./infra/prometheus/web-config.template.yml:/etc/prometheus/web-config.yml.template:ro,Z
      - prometheus_data_prod:/prometheus
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget --spider -q "http://$$PROMETHEUS_USER:$$PROMETHEUS_PASSWORD@localhost:9090/-/healthy"',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      - ADMIN_PORT
      - PROMETHEUS_USER
      - PROMETHEUS_PASSWORD
      - PROMETHEUS_BCRYPT_HASH
    user: root
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        PROM_HASH_ESC=$$(printf '%s' "$$PROMETHEUS_BCRYPT_HASH" | sed 's/[\/&\\]/\\&/g') && \
        sed "s/\$${ADMIN_PORT}/$$ADMIN_PORT/g" /etc/prometheus/prometheus.template.yml > /etc/prometheus/prometheus.yml && \
        sed -e "s/\$${PROMETHEUS_USER}/$$PROMETHEUS_USER/g" -e "s/\$${PROMETHEUS_BCRYPT_HASH}/$$PROM_HASH_ESC/g" /etc/prometheus/web-config.yml.template > /etc/prometheus/web-config.yml && \
        /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.retention.time=15d \
          --web.enable-remote-write-receiver \
          --web.config.file=/etc/prometheus/web-config.yml

  grafana:
    image: grafana/grafana:12.3.2
    container_name: goro-grafana-prod
    cpu_shares: 256
    oom_score_adj: 200
    environment:
      - GF_SECURITY_ADMIN_PASSWORD
      - PROMETHEUS_USER
      - PROMETHEUS_PASSWORD
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data_prod:/var/lib/grafana
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/dashboards:/etc/grafana/dashboards
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  node_exporter:
    image: prom/node-exporter:v1.10.2
    container_name: goro-node-exporter-prod
    cpu_shares: 128
    oom_score_adj: 500
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:9100/"]
      interval: 10s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:3.3.2
    container_name: goro-loki-prod
    cpu_shares: 256
    oom_score_adj: 300
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data_prod:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  alloy:
    image: grafana/alloy:v1.6.1
    container_name: goro-alloy-prod
    cpu_shares: 128
    oom_score_adj: 400
    restart: unless-stopped
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data_prod:/var/lib/alloy/data
    command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    user: root
    depends_on:
      - loki

volumes:
  postgres_data_prod:
  prometheus_data_prod:
  grafana_data_prod:
  loki_data_prod:
  alloy_data_prod:
  redis_data_prod:

