services:
  postgres:
    image: postgres:18-alpine@sha256:b6a16ed0eb96e2c362811f7eeb951eac8b459e7b40be4149ea5444aa7c65569b
    container_name: goro-postgres-dev
    cpu_shares: 1024
    oom_score_adj: -800
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
      - POSTGRES_HOST
      - POSTGRES_PORT
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data_dev:/var/lib/postgresql

  redis:
    image: redis:8.6.3-alpine@sha256:02c2454cd3b6277389101b9d42d009f8518255930f8b06ae33624e324f8c6455
    container_name: goro-redis-dev
    cpu_shares: 512
    oom_score_adj: -500
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data_dev:/data

  prometheus:
    image: prom/prometheus:v3.9.1@sha256:2024d7bdfc559f6254de22d65e62d799eaa8eb818fe5dbeca212d3f200b70890
    container_name: goro-prometheus-dev
    cpu_shares: 512
    oom_score_adj: 100
    restart: unless-stopped
    extra_hosts:
      - "app:host-gateway"
    volumes:
      - ./infra/prometheus/prometheus.template.yml:/etc/prometheus/prometheus.template.yml:ro,Z
      - ./infra/prometheus/web-config.template.yml:/etc/prometheus/web-config.yml.template:ro,Z
      - prometheus_data_dev:/prometheus
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget --spider -q "http://$$PROMETHEUS_USER:$$PROMETHEUS_PASSWORD@localhost:9090/-/healthy"',
        ]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "9090:9090"
    environment:
      - ADMIN_PORT
      - PROMETHEUS_USER
      - PROMETHEUS_PASSWORD
      - PROMETHEUS_BCRYPT_HASH
    user: root
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        PROM_HASH_ESC=$$(printf '%s' "$$PROMETHEUS_BCRYPT_HASH" | sed 's/[\/&\\]/\\&/g') && \
        sed "s/\$${ADMIN_PORT}/$$ADMIN_PORT/g" /etc/prometheus/prometheus.template.yml > /etc/prometheus/prometheus.yml && \
        sed -e "s/\$${PROMETHEUS_USER}/$$PROMETHEUS_USER/g" -e "s/\$${PROMETHEUS_BCRYPT_HASH}/$$PROM_HASH_ESC/g" /etc/prometheus/web-config.yml.template > /etc/prometheus/web-config.yml && \
        /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.retention.time=15d \
          --web.enable-remote-write-receiver \
          --web.config.file=/etc/prometheus/web-config.yml

  grafana:
    image: grafana/grafana:12.3.2@sha256:5c1eb28c96c2a8a103384183fb2c32f9cb499904b310b9ba8cdd6bdae435509a
    container_name: goro-grafana-dev
    cpu_shares: 256
    oom_score_adj: 200
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD
      - PROMETHEUS_USER
      - PROMETHEUS_PASSWORD
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - ./infra/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infra/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infra/grafana/dashboards:/etc/grafana/dashboards
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  node_exporter:
    image: prom/node-exporter:v1.10.2@sha256:7bcf2839f207d926b908cd3c566c9f1577efb72268062be0c96cd3b17a5cb283
    container_name: goro-node-exporter-dev
    cpu_shares: 128
    oom_score_adj: 500
    restart: unless-stopped
    ports:
      - "9100:9100"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:9100/"]
      interval: 10s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:3.3.2@sha256:e9d0a18363c9c3022aef6793a7e135000d11127fb0e18b89de08b1e21e629d60
    container_name: goro-loki-dev
    cpu_shares: 256
    oom_score_adj: 300
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data_dev:/loki
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  alloy:
    image: grafana/alloy:v1.6.1@sha256:da82cb8b6c5939fac71e2206b05101ca7581f929d6ea7c1e8dd311ccc69176fa
    container_name: goro-alloy-dev
    cpu_shares: 128
    oom_score_adj: 400
    restart: unless-stopped
    volumes:
      - ./infra/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data_dev:/var/lib/alloy/data
    command: run --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    user: root # To read /var/lib/docker/containers logs
    depends_on:
      - loki

volumes:
  postgres_data_dev:
  prometheus_data_dev:
  loki_data_dev:
  alloy_data_dev:
  redis_data_dev:
