basePath: /
definitions:
  handler.loginBody:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: secret-password
        type: string
    type: object
  handler.loginResponse:
    properties:
      token:
        example: jwt-token
        type: string
    type: object
  handler.registerBody:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: secret-password
        type: string
    type: object
  handler.whoAmIResponse:
    properties:
      uid:
        example: 018e1000-0000-7000-8000-000000000000
        type: string
    type: object
  httpschema.Detail:
    properties:
      field:
        example: email
        type: string
      issues:
        example:
        - must be a valid email
        - too short
        items:
          type: string
        type: array
    type: object
  httpschema.DetailedError:
    properties:
      code:
        example: INVALID_CREDENTIALS
        type: string
      details:
        items:
          $ref: '#/definitions/httpschema.Detail'
        type: array
      message:
        example: Invalid login or password
        type: string
      timestamp:
        example: "2026-03-02T15:04:05.123Z"
        type: string
    type: object
  httpschema.Error:
    properties:
      code:
        example: INVALID_CREDENTIALS
        type: string
      message:
        example: Invalid login or password
        type: string
      timestamp:
        example: "2026-03-02T15:04:05.123Z"
        type: string
    type: object
  httpschema.Status:
    properties:
      status:
        example: ok
        type: string
    type: object
info:
  contact: {}
  description: A nice kanban board with a beautiful heart ✨
  title: Goroutine kanban API
paths:
  /health:
    get:
      description: Check if the server is alive
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpschema.Status'
      summary: Health check
      tags:
      - health
  /login:
    post:
      consumes:
      - application/json
      description: Login with email and password to get a JWT token
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.loginResponse'
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: INVALID_CREDENTIALS or USER_NOT_FOUND
          schema:
            $ref: '#/definitions/httpschema.Error'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      summary: Login a user
      tags:
      - auth
  /register:
    post:
      consumes:
      - application/json
      description: Register a new user with email and password
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.registerBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpschema.Status'
        "400":
          description: VALIDATION_ERROR or INVALID_CREDENTIALS
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      summary: Register a new user
      tags:
      - auth
  /whoami:
    get:
      description: Get current user ID from token. This is a protected endpoint —
        in addition to the responses listed below, the auth middleware may return
        401 with codes INVALID_AUTH_HEADER or INVALID_TOKEN.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.whoAmIResponse'
        "401":
          description: 'Unauthorized: INVALID_TOKEN (handler) or INVALID_AUTH_HEADER
            / INVALID_TOKEN (auth middleware)'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
      security:
      - BearerAuth: []
      summary: Get current user info
      tags:
      - auth
swagger: "2.0"
