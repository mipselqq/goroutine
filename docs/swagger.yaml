basePath: /
definitions:
  handler.boardResponse:
    properties:
      createdAt:
        example: "2026-03-07T20:56:50.000+03:00"
        type: string
      description:
        example: My Todo Description
        type: string
      id:
        example: 019cc971-e5be-7df9-ae8a-c6e3f29c86a2
        type: string
      name:
        example: My Todo Name
        type: string
      ownerId:
        example: 019cc971-e5be-7df9-ae8a-c6e3f29c86a2
        type: string
      updatedAt:
        example: "2026-03-07T20:56:50.000+03:00"
        type: string
    type: object
  handler.columnPositionResponse:
    properties:
      position:
        example: 2
        type: integer
    type: object
  handler.columnResponse:
    properties:
      boardId:
        example: 019cc971-e5be-7df9-ae8a-c6e3f29c86a1
        type: string
      createdAt:
        example: "2026-03-07T20:56:50.000+03:00"
        type: string
      id:
        example: 019cc971-e5be-7df9-ae8a-c6e3f29c86a2
        type: string
      name:
        example: In Progress
        type: string
      position:
        example: 1
        type: integer
      updatedAt:
        example: "2026-03-07T20:56:50.000+03:00"
        type: string
    type: object
  handler.createBoardBody:
    properties:
      description:
        example: My Board Description
        type: string
      name:
        example: My Board Name
        type: string
    type: object
  handler.createColumnBody:
    properties:
      name:
        example: To Do
        type: string
    type: object
  handler.loginBody:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: secret-password
        type: string
    type: object
  handler.loginResponse:
    properties:
      token:
        example: jwt-token
        type: string
    type: object
  handler.moveColumnBody:
    properties:
      targetPosition:
        example: 1
        type: integer
    type: object
  handler.registerBody:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: secret-password
        type: string
    type: object
  handler.updateBoardBody:
    properties:
      description:
        example: My Board Description
        type: string
      name:
        example: My Board Name
        type: string
    type: object
  handler.updateColumnBody:
    properties:
      name:
        example: In Progress
        type: string
    type: object
  handler.whoAmIResponse:
    properties:
      uid:
        example: 018e1000-0000-7000-8000-000000000000
        type: string
    type: object
  httpschema.Detail:
    properties:
      field:
        example: email
        type: string
      issues:
        example:
        - must be a valid email
        - too short
        items:
          type: string
        type: array
    type: object
  httpschema.DetailedError:
    properties:
      code:
        example: INVALID_CREDENTIALS
        type: string
      details:
        items:
          $ref: '#/definitions/httpschema.Detail'
        type: array
      message:
        example: Invalid login or password
        type: string
      timestamp:
        example: "2026-03-02T15:04:05.123Z"
        type: string
    type: object
  httpschema.Error:
    properties:
      code:
        example: INVALID_CREDENTIALS
        type: string
      message:
        example: Invalid login or password
        type: string
      timestamp:
        example: "2026-03-02T15:04:05.123Z"
        type: string
    type: object
  httpschema.Status:
    properties:
      status:
        example: ok
        type: string
    type: object
info:
  contact: {}
  description: A nice kanban board with a beautiful heart ✨
  title: Goroutine kanban API
paths:
  /v1/boards:
    get:
      consumes:
      - application/json
      description: Get many boards for the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.boardResponse'
            type: array
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: 'Unauthorized: INVALID_TOKEN or INVALID_AUTH_HEADER'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      security:
      - BearerAuth: []
      summary: Get many boards
      tags:
      - boards
    post:
      consumes:
      - application/json
      description: Create a new board for the current user
      parameters:
      - description: Board details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createBoardBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.boardResponse'
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: 'Unauthorized: INVALID_TOKEN or INVALID_AUTH_HEADER'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      security:
      - BearerAuth: []
      summary: Create a new board
      tags:
      - boards
  /v1/boards/{boardId}:
    delete:
      consumes:
      - application/json
      description: Permanently delete a board and its columns and tasks for the current
        user (owner only)
      parameters:
      - description: Board ID
        in: path
        name: boardId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: 'Unauthorized: INVALID_TOKEN or INVALID_AUTH_HEADER'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "404":
          description: NOT_FOUND
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      security:
      - BearerAuth: []
      summary: Delete a board by id
      tags:
      - boards
    get:
      consumes:
      - application/json
      description: Get board metadata by id for the current user (owner only)
      parameters:
      - description: Board ID
        in: path
        name: boardId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.boardResponse'
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: 'Unauthorized: INVALID_TOKEN or INVALID_AUTH_HEADER'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "404":
          description: NOT_FOUND
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      security:
      - BearerAuth: []
      summary: Get a board by id
      tags:
      - boards
    patch:
      consumes:
      - application/json
      description: Partially update board metadata for the current user (owner only).
        Provided fields are updated; omitted or null fields are ignored.
      parameters:
      - description: Board ID
        in: path
        name: boardId
        required: true
        type: string
      - description: Board fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateBoardBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.boardResponse'
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: 'Unauthorized: INVALID_TOKEN or INVALID_AUTH_HEADER'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "404":
          description: NOT_FOUND
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      security:
      - BearerAuth: []
      summary: UpdateByID a board by id
      tags:
      - boards
  /v1/boards/{boardId}/columns:
    get:
      description: Get all columns belonging to the specified board, ordered by position
        ASC.
      parameters:
      - description: Board ID
        in: path
        name: boardId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.columnResponse'
            type: array
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: 'Unauthorized: INVALID_TOKEN or INVALID_AUTH_HEADER'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "404":
          description: BOARD_NOT_FOUND
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      security:
      - BearerAuth: []
      summary: List all columns in a board
      tags:
      - columns
    post:
      consumes:
      - application/json
      description: Create a new column in board for the current user. Column is appended
        to the end.
      parameters:
      - description: Board ID
        in: path
        name: boardId
        required: true
        type: string
      - description: Column details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.createColumnBody'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.columnResponse'
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: 'Unauthorized: INVALID_TOKEN or INVALID_AUTH_HEADER'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "404":
          description: BOARD_NOT_FOUND
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      security:
      - BearerAuth: []
      summary: Create a new column
      tags:
      - columns
  /v1/boards/{boardId}/columns/{columnId}:
    delete:
      consumes:
      - application/json
      description: Permanently delete a column from board for the current user and
        shift positions to close the gap.
      parameters:
      - description: Board ID
        in: path
        name: boardId
        required: true
        type: string
      - description: Column ID
        in: path
        name: columnId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: 'Unauthorized: INVALID_TOKEN or INVALID_AUTH_HEADER'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "404":
          description: COLUMN_NOT_FOUND
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      security:
      - BearerAuth: []
      summary: Delete a column by id
      tags:
      - columns
    patch:
      consumes:
      - application/json
      description: Partially update column metadata for the current user. Provided
        fields are updated; omitted or null fields are ignored.
      parameters:
      - description: Board ID
        in: path
        name: boardId
        required: true
        type: string
      - description: Column ID
        in: path
        name: columnId
        required: true
        type: string
      - description: Column fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.updateColumnBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.columnResponse'
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: 'Unauthorized: INVALID_TOKEN or INVALID_AUTH_HEADER'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "404":
          description: COLUMN_NOT_FOUND
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      security:
      - BearerAuth: []
      summary: Rename a column by id
      tags:
      - columns
  /v1/boards/{boardId}/columns/{columnId}/position:
    put:
      consumes:
      - application/json
      description: Move a column within a board for the current user and shift neighboring
        columns accordingly.
      parameters:
      - description: Board ID
        in: path
        name: boardId
        required: true
        type: string
      - description: Column ID
        in: path
        name: columnId
        required: true
        type: string
      - description: Target position
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.moveColumnBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.columnPositionResponse'
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: 'Unauthorized: INVALID_TOKEN or INVALID_AUTH_HEADER'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "404":
          description: COLUMN_NOT_FOUND
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      security:
      - BearerAuth: []
      summary: Move a column to a new position
      tags:
      - columns
  /v1/health:
    get:
      description: Check if the server is alive
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpschema.Status'
      summary: Health check
      tags:
      - health
  /v1/login:
    post:
      consumes:
      - application/json
      description: Login with email and password to get a JWT token
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.loginBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.loginResponse'
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "401":
          description: INVALID_CREDENTIALS or USER_NOT_FOUND
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      summary: Login a user
      tags:
      - auth
  /v1/register:
    post:
      consumes:
      - application/json
      description: Register a new user with email and password
      parameters:
      - description: Registration details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.registerBody'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpschema.Status'
        "400":
          description: VALIDATION_ERROR
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "409":
          description: USER_ALREADY_EXISTS
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      summary: Register a new user
      tags:
      - auth
  /v1/whoami:
    get:
      description: Get current user ID from token. This is a protected endpoint —
        in addition to the responses listed below, the auth middleware may return
        401 with codes INVALID_AUTH_HEADER or INVALID_TOKEN.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.whoAmIResponse'
        "401":
          description: 'Unauthorized: INVALID_TOKEN (handler) or INVALID_AUTH_HEADER
            / INVALID_TOKEN (auth middleware)'
          schema:
            $ref: '#/definitions/httpschema.DetailedError'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/httpschema.Error'
      security:
      - BearerAuth: []
      summary: Get current user info
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    description: Enter JWT token with `Bearer ` prefix, e.g. `Bearer eyJhbGciOi...`
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
